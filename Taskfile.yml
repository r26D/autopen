version: "3"

tasks:
  default:
    desc: Show autopen tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies
    cmds:
      - bun install

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - bun run typecheck

  doctor:
    desc: Run autopen doctor
    cmds:
      - bun run src/cli.ts doctor

  build:
    desc: Build the autopen binary
    cmds:
      - bun build src/cli.ts --compile --outfile bin/autopen

  run:
    desc: "Run autopen with arguments (e.g. task run -- doctor)"
    cmds:
      - bun run src/cli.ts {{.CLI_ARGS}}
